<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM 2026 — Concurs Pronosticuri</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 15px; }
  a { color: inherit; text-decoration: none; }

  /* ── Header ── */
  header { background: #fff; border-bottom: 1px solid #e8e8e0; padding: 16px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
  .logo { width: 40px; height: 40px; background: #FAC775; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 12px; color: #888; margin-top: 1px; }
  .live-badge { margin-left: auto; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .live-dot { width: 6px; height: 6px; background: #dc2626; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Tabs ── */
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e8e8e0; overflow-x: auto; position: sticky; top: 73px; z-index: 99; }
  .tab-btn { padding: 14px 20px; font-size: 13px; font-weight: 500; color: #888; border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .15s; }
  .tab-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .tab-btn:hover:not(.active) { color: #444; }

  /* ── Content ── */
  .content { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── Clasament ── */
  .standings-card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e0; overflow: hidden; margin-bottom: 20px; }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table thead th { padding: 11px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #888; background: #fafaf8; border-bottom: 1px solid #e8e8e0; text-align: left; }
  .standings-table tbody tr { transition: background .1s; }
  .standings-table tbody tr:hover { background: #fafaf8; cursor: pointer; }
  .standings-table td { padding: 12px 14px; border-bottom: 1px solid #f0f0ea; vertical-align: middle; }
  .standings-table tr:last-child td { border-bottom: none; }
  .rank-badge { width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .r1 { background: #FAC775; color: #633806; }
  .r2 { background: #e2e2da; color: #444; }
  .r3 { background: #F5C4B3; color: #4A1B0C; }
  .rn { background: #f0f0ea; color: #666; }
  .name-cell { font-weight: 500; }
  .pts-cell { font-weight: 700; font-size: 16px; color: #1a1a1a; text-align: right; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }
  .b-exact { background: #dcfce7; color: #166534; }
  .b-result { background: #dbeafe; color: #1e40af; }
  .b-miss { background: #fee2e2; color: #991b1b; }

  /* ── Meciuri ── */
  .match-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 14px; border: 1px solid #e8e8e0; background: #fff; border-radius: 99px; font-size: 13px; cursor: pointer; color: #666; transition: all .15s; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .matches-list { display: flex; flex-direction: column; gap: 10px; }
  .match-card { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; overflow: hidden; }
  .match-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #fafaf8; border-bottom: 1px solid #f0f0ea; }
  .match-id { font-size: 11px; color: #aaa; }
  .status { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
  .s-done { background: #f0f0ea; color: #666; }
  .s-pending { background: #ede9fe; color: #5b21b6; }
  .s-live { background: #fef2f2; color: #dc2626; font-weight: 700; border: 1px solid #fecaca; }
  .s-live::before { content: '● '; animation: pulse 1.2s ease-in-out infinite; }
  .match-card.live-card { border-color: #fca5a5; box-shadow: 0 0 0 2px #fee2e2; }
  .score-num.live-score { color: #dc2626; }
  .match-body { padding: 14px; }
  .score-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .team { display: flex; align-items: center; gap: 8px; }
  .team-r { justify-content: flex-end; text-align: right; }
  .flag { font-size: 22px; line-height: 1; }
  .tname { font-size: 15px; font-weight: 600; }
  .score-box { text-align: center; }
  .score-num { font-size: 26px; font-weight: 700; letter-spacing: 3px; }
  .score-pending { font-size: 18px; color: #bbb; letter-spacing: 2px; }
  .preds-section { margin-top: 12px; padding-top: 10px; border-top: 1px solid #f0f0ea; }
  .preds-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #aaa; margin-bottom: 7px; }
  .preds-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .pred-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 4px 9px; border-radius: 99px; border: 1px solid #e8e8e0; background: #fafaf8; color: #555; }
  .pred-chip .pname { font-weight: 600; }
  .pred-chip.p-exact { background: #dcfce7; border-color: #86efac; color: #166534; }
  .pred-chip.p-result { background: #dbeafe; border-color: #93c5fd; color: #1e40af; }
  .pred-chip.p-miss { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
  .pred-chip.p-pending { background: #f9fafb; border-color: #e5e7eb; color: #6b7280; }
  .pts-tag { font-weight: 700; }

  /* ── Profil jucator ── */
  .profile-header { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .profile-stats { display: flex; gap: 20px; margin-top: 14px; flex-wrap: wrap; }
  .stat-box { text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  .profile-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #888; margin-bottom: 14px; cursor: pointer; }
  .profile-back:hover { color: #444; }

  /* ── Bonus section ── */
  .bonus-card { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
  .bonus-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #888; margin-bottom: 14px; }
  .bonus-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0ea; font-size: 14px; }
  .bonus-row:last-child { border-bottom: none; }
  .bonus-pick { font-weight: 500; }
  .bonus-pts { font-size: 12px; color: #888; }
</style>
</head>
<body>

<header>
  <div class="logo">🏆</div>
  <div>
    <h1>CM 2026 — Pronosticuri</h1>
    <p id="subtitle">Se încarcă...</p>
  </div>
  <div class="live-badge" id="live-badge" style="display:none">
    <span class="live-dot"></span> LIVE
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('clasament')">🏅 Clasament</button>
  <button class="tab-btn" onclick="showTab('meciuri')">⚽ Meciuri</button>
  <button class="tab-btn" onclick="showTab('bonus')">🎯 Bonus</button>
  <button class="tab-btn" onclick="showTab('reguli')">📋 Reguli</button>
</div>

<div class="content">

  <div id="tab-clasament" class="section active">
    <div class="standings-card">
      <table class="standings-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Participant</th>
            <th>Exacte</th>
            <th>Rezultat</th>
            <th style="text-align:right">Puncte</th>
          </tr>
        </thead>
        <tbody id="standings-body"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-meciuri" class="section">
    <div class="match-filters">
      <button class="filter-btn active" onclick="filterMatches('all', this)">Toate</button>
      <button class="filter-btn" onclick="filterMatches('played', this)">Jucate</button>
      <button class="filter-btn" onclick="filterMatches('pending', this)">În așteptare</button>
    </div>
    <div id="matches-list" class="matches-list"></div>
  </div>

  <div id="tab-bonus" class="section">
    <div class="bonus-card">
      <div class="bonus-title">🏆 Câștigătoare CM 2026</div>
      <div id="bonus-winner-list"></div>
    </div>
    <div class="bonus-card">
      <div class="bonus-title">⚽ Golgheter CM 2026</div>
      <div id="bonus-gold-list"></div>
    </div>
  </div>

  <div id="tab-reguli" class="section">
    <div class="bonus-card">
      <div class="bonus-title">Cum se calculează punctele</div>
      <div style="font-size:14px; color:#555; line-height:1.6">
        <p>• <b>3 puncte</b> pentru scor exact.</p>
        <p>• <b>1 punct</b> pentru rezultat corect (1/X/2).</p>
      </div>
    </div>
  </div>

  <div id="tab-profil" class="section">
    <div class="profile-back" onclick="showTab('clasament')">← Înapoi la clasament</div>
    <div class="profile-header">
      <div class="profile-name" id="profil-name"></div>
      <div class="profile-stats">
        <div class="stat-box"><div class="stat-num" id="profil-pts" style="color:#d97706"></div><div class="stat-lbl">Puncte</div></div>
        <div class="stat-box"><div class="stat-num" id="profil-exact" style="color:#16a34a"></div><div class="stat-lbl">Exacte</div></div>
        <div class="stat-box"><div class="stat-num" id="profil-result" style="color:#2563eb"></div><div class="stat-lbl">Rezultat</div></div>
        <div class="stat-box"><div class="stat-num" id="profil-miss" style="color:#dc2626"></div><div class="stat-lbl">Greșite</div></div>
      </div>
    </div>
    <div id="profil-matches" class="matches-list"></div>
  </div>

</div>

<script>
// --- CONFIGURARE ---
const PARTICIPANTS = ["Dorin","Robert","Silviu","Adrian T","Octavian","Horia","Doru","Sorin","Cristi","Paul","Ciprian","Florin B","Sebastian"];

// Pentru meciurile viitoare, dacă nu avem predicție, punem un obiect gol
const PREDICTIONS = {
  "73": {"Dorin":[1,2],"Robert":[0,1],"Silviu":[0,0],"Adrian T":[1,2],"Octavian":[0,3],"Horia":[0,1],"Doru":[2,1],"Sorin":[0,2],"Cristi":[1,2],"Paul":[1,1],"Ciprian":[1,2],"Florin B":[1,1],"Sebastian":[0,2]}
  // Adaugă aici predicții viitoare când le primești
};

// Scoruri reale (completează aici scorurile din API pe măsură ce apar)
let SCORES = {
  "73": {"team1":"Africa de Sud","team2":"Canada","s1":0,"s2":1,"stageName":"Șaisprezecimi","utcDate":"2026-06-28T20:00:00Z"}
};

const CASTIGATOARE = {"Dorin":"Portugalia","Robert":"Franța","Silviu":"Brazilia","Adrian T":"Anglia","Octavian":"Portugalia","Horia":"Franța","Doru":"Maroc","Sorin":"Spania","Cristi":"Franța","Paul":"Portugalia","Ciprian":"Spania","Florin B":"Spania","Sebastian":"Franța"};
const GOLGHETER = {"Dorin":"Olise","Robert":"Pedri","Silviu":"Kylian Mbappé","Adrian T":"Harry Kane","Octavian":"Vitinha","Horia":"Lautaro Martínez","Sorin":"Harry Kane","Paul":"Harry Kane","Ciprian":"Lamine Yamal","Florin B":"Mbappe","Sebastian":"Kylian Mbappé"};

// --- LOGICA ---
function getResult(a, b) { return a > b ? 1 : a < b ? -1 : 0; }
function calcPoints(rs1, rs2, ps1, ps2) {
  if (rs1 === null || ps1 === null) return null;
  if (ps1 == rs1 && ps2 == rs2) return 3;
  if (getResult(ps1, ps2) === getResult(rs1, rs2)) return 1;
  return 0;
}

function computeStandings() {
  const totals = {};
  PARTICIPANTS.forEach(p => { totals[p] = {points:0, exact:0, result:0, miss:0}; });
  Object.entries(SCORES).forEach(([mid, sc]) => {
    if (sc.s1 === null) return;
    PARTICIPANTS.forEach(p => {
      const pred = PREDICTIONS[mid] && PREDICTIONS[mid][p];
      if (!pred) return;
      const pts = calcPoints(sc.s1, sc.s2, pred[0], pred[1]);
      if (pts === null) return;
      totals[p].points += pts;
      if (pts === 3) totals[p].exact++;
      else if (pts === 1) totals[p].result++;
      else totals[p].miss++;
    });
  });
  return totals;
}

function renderStandings() {
  const totals = computeStandings();
  const sorted = PARTICIPANTS.slice().sort((a, b) => totals[b].points - totals[a].points);
  const tbody = document.getElementById('standings-body');
  tbody.innerHTML = '';
  sorted.forEach((name, i) => {
    const t = totals[name];
    const rank = i + 1;
    const rc = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><span class="rank-badge ${rc}">${rank}</span></td><td class="name-cell">${name}</td><td><span class="badge b-exact">${t.exact}</span></td><td><span class="badge b-result">${t.result}</span></td><td class="pts-cell">${t.points}</td>`;
    tr.onclick = () => showProfile(name);
    tbody.appendChild(tr);
  });
}

function renderMatches(filter = 'all') {
  const container = document.getElementById('matches-list');
  container.innerHTML = '';
  Object.entries(SCORES).sort((a,b) => new Date(a[1].utcDate) - new Date(b[1].utcDate)).forEach(([mid, sc]) => {
    const isPlayed = sc.s1 !== null;
    if (filter === 'played' && !isPlayed) return;
    if (filter === 'pending' && isPlayed) return;

    const predsHtml = PARTICIPANTS.map(p => {
      const pred = PREDICTIONS[mid] && PREDICTIONS[mid][p];
      if (!pred) return `<span class="pred-chip p-pending" style="color:#aaa; border-style:dashed"><span class="pname">${p}</span> NLY</span>`;
      const pts = calcPoints(sc.s1, sc.s2, pred[0], pred[1]);
      let cls = 'p-pending', ptsTxt = '';
      if (pts === 3) { cls = 'p-exact'; ptsTxt = ' +3'; }
      else if (pts === 1) { cls = 'p-result'; ptsTxt = ' +1'; }
      else if (pts === 0) { cls = 'p-miss'; ptsTxt = ' 0'; }
      return `<span class="pred-chip ${cls}"><span class="pname">${p}</span> ${pred[0]}-${pred[1]}${pts !== null ? `<span class="pts-tag">${ptsTxt}</span>` : ''}</span>`;
    }).join('');

    container.innerHTML += `
      <div class="match-card">
        <div class="match-head"><span>${sc.stageName || 'Meci'} #${mid}</span> <span class="status ${isPlayed ? 's-done' : 's-pending'}">${isPlayed ? 'Terminat' : 'Așteptare'}</span></div>
        <div class="match-body">
          <div class="score-row"><div class="team"><span class="tname">${sc.team1}</span></div><div class="score-box"><span class="score-num">${isPlayed ? sc.s1+' - '+sc.s2 : 'vs'}</span></div><div class="team team-r"><span class="tname">${sc.team2}</span></div></div>
          <div class="preds-section"><div class="preds-label">Pronosticuri</div><div class="preds-grid">${predsHtml}</div></div>
        </div>
      </div>`;
  });
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector(`[onclick="showTab('${id}')"]`)?.classList.add('active');
}

function filterMatches(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatches(f);
}

function showProfile(name) {
  document.getElementById('profil-name').textContent = name;
  const t = computeStandings()[name];
  document.getElementById('profil-pts').textContent = t.points;
  document.getElementById('profil-exact').textContent = t.exact;
  document.getElementById('profil-result').textContent = t.result;
  document.getElementById('profil-miss').textContent = t.miss;
  showTab('profil');
}

renderStandings(); renderMatches(); renderBonus();
function renderBonus() {
  document.getElementById('bonus-winner-list').innerHTML = PARTICIPANTS.map(p => `<div class="bonus-row"><span>${p}</span><span>${CASTIGATOARE[p]}</span></div>`).join('');
  document.getElementById('bonus-gold-list').innerHTML = PARTICIPANTS.map(p => `<div class="bonus-row"><span>${p}</span><span>${GOLGHETER[p]}</span></div>`).join('');
}
document.getElementById('subtitle').textContent = "Concurs activ";
</script>
</body>
</html>
