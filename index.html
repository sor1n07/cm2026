<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM 2026 — Concurs Pronosticuri</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 15px; }
  a { color: inherit; text-decoration: none; }

  /* ── Header ── */
  header { background: #fff; border-bottom: 1px solid #e8e8e0; padding: 16px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
  .logo { width: 40px; height: 40px; background: #FAC775; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 12px; color: #888; margin-top: 1px; }
  .live-badge { margin-left: auto; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .live-dot { width: 6px; height: 6px; background: #dc2626; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Tabs ── */
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e8e8e0; overflow-x: auto; position: sticky; top: 73px; z-index: 99; }
  .tab-btn { padding: 14px 20px; font-size: 13px; font-weight: 500; color: #888; border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .15s; }
  .tab-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

  .content { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── Clasament ── */
  .standings-card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e0; overflow: hidden; margin-bottom: 20px; }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table thead th { padding: 11px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #888; background: #fafaf8; border-bottom: 1px solid #e8e8e0; text-align: left; }
  .standings-table tbody tr { transition: background .1s; cursor: pointer; }
  .standings-table tbody tr:hover { background: #fafaf8; }
  .standings-table td { padding: 12px 14px; border-bottom: 1px solid #f0f0ea; vertical-align: middle; }
  .rank-badge { width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .r1 { background: #FAC775; color: #633806; }
  .r2 { background: #e2e2da; color: #444; }
  .r3 { background: #F5C4B3; color: #4A1B0C; }
  .rn { background: #f0f0ea; color: #666; }
  .pts-cell { font-weight: 700; font-size: 16px; text-align: right; }

  /* ── Filtre Meciuri ── */
  .match-filters { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .filter-btn { padding: 8px 14px; font-size: 13px; font-weight: 500; color: #555; background: #fff; border: 1px solid #e8e8e0; border-radius: 99px; cursor: pointer; white-space: nowrap; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  /* ── Meciuri ── */
  .match-card { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .match-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #fafaf8; border-bottom: 1px solid #f0f0ea; }
  .match-id { font-size: 11px; color: #aaa; font-weight:600; }
  .status { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
  .s-done { background: #f0f0ea; color: #666; }
  .s-pending { background: #ede9fe; color: #5b21b6; }
  .s-live { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .match-body { padding: 14px; }
  .score-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .team { display: flex; align-items: center; font-size: 15px; font-weight: 600; }
  .team-r { justify-content: flex-end; text-align: right; }
  .score-num { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
  .live-score { color: #dc2626; }
  .score-pending { font-size: 18px; color: #bbb; letter-spacing: 2px; }

  /* ── Chip-uri Predicții ── */
  .preds-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f0f0ea; }
  .pred-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 4px 9px; border-radius: 99px; border: 1px solid #e8e8e0; background: #fafaf8; color: #555; }
  .pred-chip .pname { font-weight: 600; }
  .p-exact { background: #dcfce7; border-color: #86efac; color: #166534; }
  .p-result { background: #dbeafe; border-color: #93c5fd; color: #1e40af; }
  .p-miss { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
  .p-pending { background: #f9fafb; border-color: #e5e7eb; color: #6b7280; }
  .pts-tag { font-weight: 700; }

  /* ── Bonus ── */
  .bonus-section { background: #fff; border-radius: 12px; border: 1px solid #e8e8e0; overflow: hidden; margin-bottom: 20px; }
  .bonus-header { padding: 14px; background: #fafaf8; border-bottom: 1px solid #e8e8e0; font-weight: 600; display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
  .bonus-body { padding: 0; display: none; }
  .bonus-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .bonus-table td, .bonus-table th { padding: 10px 14px; border-bottom: 1px solid #f0f0ea; text-align: left; }
  .bonus-table th { background: #f9fafb; color: #888; font-weight: 600; font-size: 11px; text-transform: uppercase; }

  /* ── Profil Jucător ── */
  .profile-header { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .profile-name { font-size: 22px; font-weight: 700; }
  .profile-stats { display: flex; gap: 20px; margin-top: 14px; }
  .stat-box { text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: #888; text-transform: uppercase; }
  .profile-back { display: inline-flex; cursor: pointer; color: #888; margin-bottom: 14px; font-weight: 500; }
  
  .badge { display: inline-flex; padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: 700; }
</style>
</head>

<header>
  <div class="logo">🏆</div>
  <div>
    <h1>CM 2026 — Pronosticuri</h1>
    <p id="subtitle">Se încarcă...</p>
  </div>
  <div class="live-badge" id="live-badge" style="display:none"><span class="live-dot"></span> LIVE</div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('clasament')">🏅 Clasament</button>
  <button class="tab-btn" onclick="showTab('meciuri')">⚽ Meciuri</button>
  <button class="tab-btn" onclick="showTab('bonus')">🎁 Bonusuri</button>
</div>

<div class="content">

  <div id="tab-clasament" class="section active">
    <div class="standings-card">

  </div>

  <div id="tab-meciuri" class="section">

  <div id="tab-bonus" class="section">
    <div class="bonus-section">

    </div>
    <div class="bonus-section">

      </div>
      <div class="bonus-body" id="bonus-goal">
        <table class="bonus-table">
          <thead><tr><th>Jucător</th><th>Golgheter</th></tr></thead>
          <tbody id="tbody-goal"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-profil" class="section">
    <div class="profile-back" onclick="showTab('clasament')">← Înapoi la clasament</div>
    <div class="profile-header">
      <div class="profile-name" id="profil-name"></div>
      <div class="profile-stats">

        <div class="stat-box"><div class="stat-num" id="profil-exact" style="color:#16a34a"></div><div class="stat-lbl">Exacte</div></div>

      </div>
    </div>
    <div id="profil-matches"></div>
  </div>
</div>

];

let currentFilter = 'all';

function getResult(a, b) { return a > b ? 1 : a < b ? -1 : 0; }
function calcPoints(rs1, rs2, ps1, ps2) {
  if (rs1 === null || ps1 === null || rs1 === undefined) return null;
  if (ps1 == rs1 && ps2 == rs2) return 3;
  if (getResult(ps1, ps2) === getResult(rs1, rs2)) return 1;
  return 0;
}

function computeStandings() {
  const totals = {};
  PARTICIPANTS.forEach(p => { totals[p] = {points:0, exact:0, result:0}; });
  Object.entries(SCORES).forEach(([mid, sc]) => {
    if (sc.s1 === null || sc.s1 === undefined) return;
    PARTICIPANTS.forEach(p => {
      const pred = PREDICTIONS[mid] && PREDICTIONS[mid][p];
      if (!pred) return;
      const pts = calcPoints(sc.s1, sc.s2, pred[0], pred[1]);
      if (pts === null) return;
      totals[p].points += pts;
      if (pts === 3) totals[p].exact++;
      else if (pts === 1) totals[p].result++;
    });
  });
  return totals;
}

function renderStandings() {
  const totals = computeStandings();
  const sorted = PARTICIPANTS.slice().sort((a, b) => {
    if (totals[b].points !== totals[a].points) return totals[b].points - totals[a].points;
    if (totals[b].exact !== totals[a].exact) return totals[b].exact - totals[a].exact;
    return totals[b].result - totals[a].result;
  });
  const tbody = document.getElementById('standings-body');
  tbody.innerHTML = '';
  sorted.forEach((name, i) => {
    const t = totals[name];
    const rank = i + 1;
    const rc = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><span class="rank-badge ${rc}">${rank}</span></td><td style="font-weight:500">${name}</td><td><span class="badge p-exact">${t.exact}</span></td><td><span class="badge p-result">${t.result}</span></td><td class="pts-cell">${t.points}</td>`;
    tr.onclick = () => showProfile(name);
    tbody.appendChild(tr);
  });
}

function filterMatches(type, btnObj) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btnObj) btnObj.classList.add('active');
  renderMatches();
}

function renderMatches() {
  const container = document.getElementById('matches-list');
  container.innerHTML = '';
  Object.entries(SCORES).reverse().forEach(([mid, sc]) => {
    const isPlayed = sc.s1 !== null && sc.s1 !== undefined;
    if (currentFilter === 'played' && !isPlayed) return;
    if (currentFilter === 'pending' && isPlayed) return;

    const scoreHtml = isPlayed || sc.isLive
      ? `<div style="display: flex; flex-direction: column; align-items: center; line-height: 1;">
           <span class="score-num ${sc.isLive ? 'live-score' : ''}">${sc.s1 !== null ? sc.s1 : 0} — ${sc.s2 !== null ? sc.s2 : 0}</span>
           ${(sc.fs1 !== undefined && sc.fs1 !== null) ? `<span style="font-size: 13px; color: #555; font-weight: 700; margin-top: 5px;">${sc.fs1} — ${sc.fs2}</span>` : ''}
         </div>`
      : `<span class="score-pending">vs</span>`;

    const predsHtml = PARTICIPANTS.map(p => {
      const pred = PREDICTIONS[mid] && PREDICTIONS[mid][p];
      if (!pred) return `<span class="pred-chip p-pending"><span class="pname">${p}</span> NLY</span>`;
      const pts = calcPoints(sc.s1, sc.s2, pred[0], pred[1]);
      let cls = 'p-pending', ptsTxt = '';
      if (pts === 3) { cls = 'p-exact'; ptsTxt = ' +3'; }
      else if (pts === 1) { cls = 'p-result'; ptsTxt = ' +1'; }
      else if (pts === 0) { cls = 'p-miss'; ptsTxt = ' 0'; }
      return `<span class="pred-chip ${cls}"><span class="pname">${p}</span> ${pred[0]}-${pred[1]}${pts !== null ? `<span class="pts-tag">${ptsTxt}</span>` : ''}</span>`;
    }).join('');

    container.innerHTML += `
      <div class="match-card">
        <div class="match-head"><span>${sc.stageName || 'Grupe'} #${mid}</span> <span class="status ${isPlayed ? 's-done' : (sc.isLive ? 's-live' : 's-pending')}">${sc.isLive ? 'LIVE' : (isPlayed ? 'Terminat' : 'Așteptare')}</span></div>
        <div class="match-body">
          <div class="score-row"><div class="team">${sc.team1}</div>${scoreHtml}<div class="team team-r">${sc.team2}</div></div>
          <div class="preds-grid">${predsHtml}</div>
        </div>
      </div>`;
  });
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
}

function toggleBonus(id) {
  const el = document.getElementById(id);
  const arr = document.getElementById('arr-' + id.split('-')[1]);
  if (el.style.display === 'block') { el.style.display = 'none'; arr.textContent = '▼'; }
  else { el.style.display = 'block'; arr.textContent = '▲'; }
}

function renderBonus() {
  document.getElementById('tbody-champ').innerHTML = BONUS_CHAMP.map(b => `<tr><td style="font-weight:500">${b.p}</td><td>${b.t}</td></tr>`).join('');
  document.getElementById('tbody-goal').innerHTML = BONUS_GOAL.map(b => `<tr><td style="font-weight:500">${b.p}</td><td>${b.t}</td></tr>`).join('');
}

function showProfile(name) {
  document.getElementById('profil-name').textContent = name;
  const t = computeStandings()[name];
  document.getElementById('profil-pts').textContent = t.points;
  document.getElementById('profil-exact').textContent = t.exact;
  document.getElementById('profil-result').textContent = t.result;
  
  const container = document.getElementById('profil-matches');
  container.innerHTML = '';
  Object.entries(SCORES).reverse().forEach(([mid, sc]) => {
    const pred = PREDICTIONS[mid] && PREDICTIONS[mid][name];
    if (!pred) return;
    const isPlayed = sc.s1 !== null && sc.s1 !== undefined;
    const pts = calcPoints(sc.s1, sc.s2, pred[0], pred[1]);
    
    let bg = '#fff';
    if (pts === 3) bg = '#f0fdf4';
    else if (pts === 1) bg = '#eff6ff';
    else if (pts === 0) bg = '#fef2f2';

    const scoreHtml = isPlayed || sc.isLive
        ? `<div class="score-box" style="display: flex; flex-direction: column; align-items: center; line-height: 1;">
            <span class="score-num" style="font-size:18px">${sc.s1} — ${sc.s2}</span>
            ${(sc.fs1 !== undefined && sc.fs1 !== null) ? `<span style="font-size: 11px; color: #777; font-weight: 600; margin-top: 3px;">${sc.fs1} — ${sc.fs2}</span>` : ''}
          </div>`
        : `<div class="score-box"><span class="score-pending" style="font-size:16px">vs</span></div>`;

    container.innerHTML += `
      <div class="match-card" style="background:${bg}">
        <div class="match-head" style="background:transparent; padding-bottom:4px; border-bottom:none">
          <span style="font-size:12px; font-weight:600; color:#555">Pariul tău: ${pred[0]} - ${pred[1]} ${pts !== null ? `(${pts} pct)` : ''}</span>
          <span class="status ${isPlayed ? 's-done' : 's-pending'}">${isPlayed ? 'Terminat' : 'Așteptare'}</span>
        </div>
        <div class="match-body" style="padding-top:4px">
          <div class="score-row"><div class="team">${sc.team1}</div>${scoreHtml}<div class="team team-r">${sc.team2}</div></div>
        </div>
      </div>`;
  });
  showTab('profil');
}

// ==========================================
// FETCH API
// ==========================================
async function fetchLiveScores() {
  try {
    const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
      headers: { 'X-Auth-Token': 'a2cd4dbb3ef14d02bbf96a60cd8dbf2d' }
    });
    if (!res.ok) throw new Error('API failed');
    const data = await res.json();
    
    let liveCount = 0;
    let updated = 0;
    
    data.matches.forEach(g => {
      const isFinished = g.status === 'FINISHED';
      const isLive = ['IN_PLAY', 'PAUSED'].includes(g.status);
      if (isLive) liveCount++;

      const t1 = TEAM_MAP[g.homeTeam?.name] || g.homeTeam?.name;
      const t2 = TEAM_MAP[g.awayTeam?.name] || g.awayTeam?.name;

      if (!t1 || !t2) return;

      let mid = null;
      for (let k in SCORES) {
        if ((SCORES[k].team1 === t1 && SCORES[k].team2 === t2) || 
            (SCORES[k].team1 === t2 && SCORES[k].team2 === t1)) {
          mid = k; break;
        }
      }

      if (mid && (isFinished || isLive)) {
        let s1 = g.score?.regularTime?.home;
        let s2 = g.score?.regularTime?.away;
        
        if (s1 === undefined || s1 === null) {
            s1 = g.score?.fullTime?.home;
            s2 = g.score?.fullTime?.away;
        }

        let fs1 = null, fs2 = null;
        let ft1 = g.score?.fullTime?.home;
        let ft2 = g.score?.fullTime?.away;
        let p1 = g.score?.penalties?.home;
        let p2 = g.score?.penalties?.away;

        if ((ft1 !== undefined && ft1 !== null && (ft1 !== s1 || ft2 !== s2)) || 
            (p1 !== undefined && p1 !== null)) {
            if (p1 !== undefined && p1 !== null) {
                fs1 = ft1 + p1; 
                fs2 = ft2 + p2;
            } else {
                fs1 = ft1; 
                fs2 = ft2;
            }
        }

        if (s1 !== null && s1 !== undefined) {
            if (SCORES[mid].team1 === t1) {
              SCORES[mid].s1 = s1; SCORES[mid].s2 = s2;
              if (fs1 !== null) { SCORES[mid].fs1 = fs1; SCORES[mid].fs2 = fs2; }
            } else {
              SCORES[mid].s1 = s2; SCORES[mid].s2 = s1;
              if (fs1 !== null) { SCORES[mid].fs1 = fs2; SCORES[mid].fs2 = fs1; }
            }
            SCORES[mid].isLive = isLive;
            updated++;
        }
      }
    });

    document.getElementById('live-badge').style.display = liveCount > 0 ? 'flex' : 'none';
    renderStandings();
    renderMatches();
    const playedNow = Object.values(SCORES).filter(s => s.s1 !== null).length;
    document.getElementById('subtitle').textContent = `${playedNow} din 76 meciuri jucate · Actualizat Live`;

  } catch (err) {
    console.warn('API error:', err);
  }
}
